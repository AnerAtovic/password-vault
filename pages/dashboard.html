<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/dashboard.css">
</head>

<body>
    <div class="top">
        <div class="left">
            <h3>SecureVault</h3>
            <p id="user-email"></p>
        </div>

        <div class="right">
            <button id="logout-btn">
                <svg class="icon logout" xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">

                    <path d="M9 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h4"/>
                    <path d="M16 17l5-5-5-5"/>
                    <path d="M21 12H9"/>
                </svg>
                Logout
            </button>
        </div>
    </div>

    <div class="components">
        <div class="search-wrapper">
            <svg class="icon search" xmlns="http://www.w3.org/2000/svg"
                 viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="search-input" placeholder="Search...">
        </div>
        <button id="generate-password-btn">Generate Password</button>
        <button id="add-password-btn"><span style="margin-right: 5px;">+</span> Add Password</button>
    </div>

    <div class="filters">
        <!-- Filter Icon -->
        <svg class="icon filter" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6h16l-6.5 7.5V19l-3 1.5v-7L4 6z"/>
        </svg>


        <button id="all" class="btn-active">All</button>
        <button id="email">Email</button>
        <button id="Development">Development</button>
        <button id="Entertainment">Entertainment</button>
        <button id="Shopping">Shopping</button>
        <button id="Work">Work</button>
    </div>
    <div class="content">
        <div class="card">

            <div class="top-card">
                <div class="mail-and-link">
                    <h3>Gmail</h3>
                    <button class="open-link">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            d="M14 3h7v7m0-7L10 14"/>
                        <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            d="M5 10v11h11"/>
                        </svg>
                    </button>
                </div>
                <div class="icons">
                    

                    <!-- Star Icon -->
                    <button class="btn-favourite">
                        <svg class="icon star" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path class="star-path"
                            d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l2.036 6.26a1 1 0 00.95.69h6.588c.969 0 1.371 1.24.588 1.81l-5.33 3.872a1 1 0 00-.364 1.118l2.036 6.26c.3.921-.755 1.688-1.54 1.118l-5.33-3.872a1 1 0 00-1.175 0l-5.33 3.872c-.784.57-1.838-.197-1.539-1.118l2.036-6.26a1 1 0 00-.364-1.118L.887 11.687c-.783-.57-.38-1.81.588-1.81h6.588a1 1 0 00.95-.69l2.036-6.26z"/>
                        </svg>
                    </button>

                     <!-- Trash Icon -->
                    <button class="btn-delete">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-1 14H6L5 7m5 4v6m4-6v6M9 7V4h6v3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <p class="user-email" data-account-id="user@gmail.com">user@gmail.com</p>
            <div class="email-block" data-category="email">Email</div>

            <div class="password-block">
                <p>Username</p>
                <div class="usr">
                    <div class="mail-and-cop">
                        <div class="blackbox">
                            <p class="user-email">user@gmail.com</p>
                        </div>

                        <!-- Copy Button icon -->
                        <button class="btn-copy-username">
                            <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke-width="2"/>
                                <path stroke-width="2" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <p>Password</p>
                <div class="pass">
                    <div class="blackbox">
                        *******
                    </div>

                    <!-- Eye Icon To Show -->
                    <button class="icon-btn">
                        <svg class="icon eye" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            
                            <!-- Normal Eye -->
                            <path class="eye-open"
                            d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                            stroke="currentColor" stroke-width="2" fill="none"/>
                            <circle class="eye-open"
                            cx="12" cy="12" r="3"
                            stroke="currentColor" stroke-width="2" fill="none"/>

                            <!-- Cross Line -->
                            <line class="eye-closed"
                            x1="3" y1="3" x2="21" y2="21"
                            stroke="currentColor" stroke-width="2"/>

                        </svg>
                    </button> 

                     <!-- Copy Button Icon -->
                    <button class="btn-copy-password">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke-width="2"/>
                            <path stroke-width="2" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                        </svg>
                    </button>
                </div>
                <p id="modified">Last modified 26.2.2026</p>
            </div>

        </div>
        
        <dialog id="add-password-modal">
            <div class="modal-top add-pass">
                <h2>Add New Password</h2>
                <button class="btn-clear" id="close-add-modal">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <form action="" id="add-password-form">
                <div>
                    <label for="title">Title *</label>
                    <input type="text" id="title" placeholder="eg., Gmail, GitHub" required>
                </div>

                <div>
                    <label for="username-email">Username / Email *</label>
                    <input type="text" id="username-email" placeholder="Username / Email" required>
                </div>
                
                <div>
                    <label for="password">Password *</label>
                    <input type="text" id="password" placeholder="Enter Password" required>
                </div>

                <div>
                    <label for="url">URL (optional)</label>
                    <input type="text" id="url" placeholder="https://example.com">
                </div>

                <div>
                    <label for="category">Category</label>
                    <select id="category" required>
                            <option value="General" selected>General</option>
                            <option value="Email">Email</option>
                            <option value="Development">Development</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Work">Work</option>
                    </select>
                </div>

                <div class="bottom-buttons">
                    <button id="cancel-add-password-btn" type="submit">Cancel</button>
                    <button id="submit-password" type="submit">Add Password</button>
                </div>
            </form>
        </dialog>



        <dialog id="generate-password-modal">
            <div class="modal-top">
                <h2>Password Generator</h2>
                <button class="btn-clear" id="close-generate-modal">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="modal-strength">
                <p>Generated Password</p>
                <p id="strength">Medium</p>
            </div>

            <div class="pass-and-buttons">
                <input type="text" id="generated-password" readonly>
                <button id="regenerate" class="btn-clear">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 0 0-15-6"/>
                        <polyline points="6 3 6 9 12 9"/>
                        <path d="M3 12a9 9 0 0 0 15 6"/>
                        <polyline points="18 21 18 15 12 15"/>
                    </svg>
                </button>
                <button id="copy-generated" class="btn-clear">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke-width="2"/>
                        <path stroke-width="2" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                    </svg>
                </button>
            </div>

            <div class="modal-options">
                <div class="modal-slider">
                    <label for="password-length" class="text-slate">Length <span id="length-value">12</span></label>
                    <input type="range" id="password-length" name="length" min="8" max="32" value="12">
                    <p><span>8</span><span>32</span></p>
                </div>

                <div class="check-boxes">
                    <label class="form-control"><input type="checkbox" id="uppercase" checked><span class="text-slate">Uppercase (A-Z)</span></label>
                    <label class="form-control"><input type="checkbox" id="lowercase" checked><span class="text-slate">Lowercase (a-z)</span></label>
                    <label class="form-control"><input type="checkbox" id="numbers" checked><span class="text-slate">Numbers (0-9)</span></label>
                    <label class="form-control"><input type="checkbox" id="symbols" checked><span class="text-slate">Symbols (!@#$%...)</span></label>
                </div>
            </div>

            <div class="modal-big-button">
                <button class="done" id="generate-modal-done">Done</button>
            </div>

        </dialog>

        <p id="copy-msg">Copied to clipboard!</p>

        <div class="password-added-successfully">
            <div class="contents">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none" class="icon">
                    <circle cx="10" cy="10" r="9" fill="white"/>
                    <path
                        d="M6 10.2L8.6 12.8L14 7.4"
                        stroke="black"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    />
                </svg>
                <p>Password added successfully!</p>
            </div>
        </div>






    </div>
    <script src="../js/pages/dashboard.js"></script>
    <script src="../js/modals/add-password.modal.js"> </script>
    <script src="../js/modals/generate-password.modal.js"> </script>
</body>
</html>
