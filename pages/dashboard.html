<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/dashboard.css">
</head>

<body>
    <div class="main-content">
        <div class="top">
            <div class="left">
                <div class="shield-bg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock-icon lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <div class="title">
                    <h1>SecureVault</h1>
                    <p id="user-email">tmp@gmail.com</p>
                </div>
            </div>
            
            <div class="right">
                <button id="logout-btn" class="btn">
                    <svg class="icon logout" xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">

                        <path d="M9 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h4"/>
                        <path d="M16 17l5-5-5-5"/>
                        <path d="M21 12H9"/>
                    </svg>
                    Log Out
                </button>
            </div>
        </div>
        
        <div class="components">
            <div class="search-wrapper">
                <svg class="icon search" xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="search" id="search-input" placeholder="Search...">
            </div>
            <div class="search-buttons">
                <button id="generate-password-btn" class="btn">Generate Password</button>
                <button id="add-password-btn" class="btn btn-active"><span aria-hidden="true">+</span> Add Password</button>
            </div>
        </div>
        
        <div class="filters">
            <!-- Filter Icon -->
            <svg class="icon filter" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 6h16l-6.5 7.5V19l-3 1.5v-7L4 6z"/>
            </svg>

            <div class="filter-btns">
                <button id="all" class="btn btn-active" value="All">All</button>
                <button id="email" class="btn" value="Email">Email</button>
                <button id="Development" class="btn" value="Development">Development</button>
                <button id="Entertainment" class="btn" value="Entertainment">Entertainment</button>
                <button id="Shopping" class="btn" value="Shopping">Shopping</button>
                <button id="Work" class="btn" value="Work">Work</button>
            </div>


        </div>
        <div class="content">
            <div id="cards">
                <!-- Cards will be generated here -->
                 
            </div>
            
            <div id="no-password" aria-live="polite">
                <!-- Lock Logo -->
                <svg class="empty-state-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <h3 class="empty-state-title">No passwords found</h3>
                <p class="empty-state-description">Try adjusting your search or add a new password</p>
            </div>
            
            
            <dialog id="add-password-modal">
                <div class="modal-top add-pass">
                    <h2>Add New Password</h2>
                    <button class="btn-clear" id="close-add-modal">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                
                <form action="" id="add-password-form">
                    <div>
                        <label for="title">Title *</label>
                        <input type="text" id="title" name="title" placeholder="eg., Gmail, GitHub" autocomplete="username" required>
                    </div>

                    <div>
                        <label for="username-email">Username / Email *</label>
                        <input type="string" id="username-email" name="username-email" placeholder="Username / Email"  required>
                    </div>
                    
                    <div class="pass-show">
                        <label for="password">Password *</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="password" name="password" placeholder="Enter Password" autocomplete="new-password" required>
                            <button type="button" class="icon-btn show-password">
                                <svg class="icon eye active" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <!-- Cross Line (visible when password hidden) -->
                                    <line class="eye-closed"
                                    x1="3" y1="3" x2="21" y2="21"
                                    stroke="currentColor" stroke-width="2"/>

                                    <!-- Normal Eye (hidden when password hidden) -->
                                    <path class="eye-open"
                                    d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                                    stroke="currentColor" stroke-width="2" fill="none"/>
                                    <circle class="eye-open"
                                    cx="12" cy="12" r="3"
                                    stroke="currentColor" stroke-width="2" fill="none"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label for="url">URL (optional)</label>
                        <input type="url" id="url" name="url" placeholder="https://example.com">
                    </div>
                    
                    <div>
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                                <option value="General" selected>General</option>
                                <option value="Email">Email</option>
                                <option value="Development">Development</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Work">Work</option>
                            </select>
                    </div>

                    <div class="bottom-buttons">
                        <button id="cancel-add-password-btn" class="btn-modal-secondary" type="submit">Cancel</button>
                        <button id="submit-password" class="btn-modal-primary" type="submit">Add Password</button>
                    </div>
                </form>
            </dialog>
            
            

            <dialog id="generate-password-modal">
                <div class="modal-top">
                    <h2>Password Generator</h2>
                    <button class="btn-clear" id="close-generate-modal">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="modal-strength">
                    <p>Generated Password</p>
                    <p id="strength">Medium</p>
                </div>

                <div class="pass-and-buttons">
                    <input type="text" id="generated-password" readonly>
                    <button id="regenerate" class="btn-clear">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 0 0-15-6"/>
                            <polyline points="6 3 6 9 12 9"/>
                            <path d="M3 12a9 9 0 0 0 15 6"/>
                            <polyline points="18 21 18 15 12 15"/>
                        </svg>
                    </button>
                    <button id="copy-generated" class="btn-clear btn-copy">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke-width="2"/>
                            <path stroke-width="2" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                        </svg>
                    </button>
                </div>

                <div class="modal-options">
                    <div class="modal-slider">
                        <label for="password-length" class="text-slate">Length <span id="length-value">12</span></label>
                        <input type="range" id="password-length" name="length" min="8" max="32" value="12">
                        <p><span>8</span><span>32</span></p>
                    </div>
                    
                    <div class="check-boxes">
                        <label class="form-control"><input type="checkbox" id="uppercase" checked><span class="text-slate">Uppercase (A-Z)</span></label>
                        <label class="form-control"><input type="checkbox" id="lowercase" checked><span class="text-slate">Lowercase (a-z)</span></label>
                        <label class="form-control"><input type="checkbox" id="numbers" checked><span class="text-slate">Numbers (0-9)</span></label>
                        <label class="form-control"><input type="checkbox" id="symbols" checked><span class="text-slate">Symbols (!@#$%...)</span></label>
                    </div>
                </div>
                
                <div class="modal-big-button">
                    <button class="done btn-modal-primary" id="generate-modal-done">Done</button>
                </div>

            </dialog>

            <div id="notification">
                <div class="notification-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none" class="icon">
                        <circle cx="10" cy="10" r="9" fill="white"/>
                        <path
                            d="M6 10.2L8.6 12.8L14 7.4"
                            stroke="black"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            />
                        </svg>
                        <p>Password copied to clipboard!</p>
                </div>
            </div>

           

            


            
        </div>
    </div>
    <script type="module" src="../js/pages/dashboard.js"></script>
    <script type="module" src="../js/modals/add-password.modal.js"> </script>
    <script type="module" src="../js/modals/generate-password.modal.js"> </script>
</body>
</html>
